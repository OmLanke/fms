---
# ConfigMap with Grafana INI configuration and datasource provisioning
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-config
  namespace: ticketflow
  labels:
    app: grafana
    app.kubernetes.io/component: monitoring
data:
  grafana.ini: |
    [server]
    root_url = http://localhost:30030

    [security]
    admin_user = admin
    # admin_password is set via GF_SECURITY_ADMIN_PASSWORD env var

    [auth.anonymous]
    enabled = false

    [analytics]
    reporting_enabled = false
    check_for_updates = false

  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
        jsonData:
          timeInterval: "15s"

      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
        jsonData:
          maxLines: 1000

      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://jaeger:16686

  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: ticketflow
        orgId: 1
        type: file
        disableDeletion: false
        updateIntervalSeconds: 30
        allowUiUpdates: true
        options:
          path: /etc/grafana/provisioning/dashboards/json

---
# ConfigMap with pre-built dashboard JSON files
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: ticketflow
  labels:
    app: grafana
    app.kubernetes.io/component: monitoring
data:
  services-overview.json: |
    {
      "uid": "ticketflow-overview",
      "title": "TicketFlow — Services Overview",
      "tags": ["ticketflow"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "15s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Services Up",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 5 },
                  { "color": "green", "value": 7 }
                ]
              },
              "mappings": []
            }
          },
          "targets": [
            {
              "expr": "count(up{job=\"kubernetes-pods\"} == 1)",
              "legendFormat": "Up",
              "refId": "A"
            }
          ]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Services Down",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "auto"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 2 }
                ]
              },
              "mappings": []
            }
          },
          "targets": [
            {
              "expr": "count(up{job=\"kubernetes-pods\"} == 0) or vector(0)",
              "legendFormat": "Down",
              "refId": "A"
            }
          ]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Prometheus Scrape Targets",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none"
          },
          "fieldConfig": {
            "defaults": {
              "thresholds": {
                "mode": "absolute",
                "steps": [{ "color": "blue", "value": null }]
              }
            }
          },
          "targets": [
            {
              "expr": "count(up)",
              "legendFormat": "Total",
              "refId": "A"
            }
          ]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Prometheus Up",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"] },
            "colorMode": "background",
            "graphMode": "none",
            "textMode": "value"
          },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" }, "0": { "text": "DOWN", "color": "red" } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            }
          },
          "targets": [
            {
              "expr": "up{job=\"prometheus\"}",
              "legendFormat": "Prometheus",
              "refId": "A"
            }
          ]
        },
        {
          "id": 5,
          "type": "table",
          "title": "Service Scrape Health",
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": {
            "sortBy": [{ "displayName": "Service", "desc": false }],
            "footer": { "show": false }
          },
          "fieldConfig": {
            "defaults": {},
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Value" },
                "properties": [
                  { "id": "displayName", "value": "Status" },
                  {
                    "id": "mappings",
                    "value": [
                      { "type": "value", "options": { "1": { "text": "UP", "color": "green" }, "0": { "text": "DOWN", "color": "red" } } }
                    ]
                  },
                  { "id": "custom.displayMode", "value": "color-background" }
                ]
              },
              {
                "matcher": { "id": "byName", "options": "kubernetes_pod_name" },
                "properties": [{ "id": "displayName", "value": "Pod" }]
              },
              {
                "matcher": { "id": "byName", "options": "app" },
                "properties": [{ "id": "displayName", "value": "Service" }]
              },
              {
                "matcher": { "id": "byName", "options": "kubernetes_namespace" },
                "properties": [{ "id": "displayName", "value": "Namespace" }]
              }
            ]
          },
          "transformations": [
            { "id": "labelsToFields", "options": { "mode": "columns" } },
            {
              "id": "organize",
              "options": {
                "excludeByName": {
                  "Time": true, "job": true, "__name__": true,
                  "app.kubernetes.io/component": true,
                  "instance": true
                },
                "renameByName": {}
              }
            }
          ],
          "targets": [
            {
              "expr": "up{job=\"kubernetes-pods\"}",
              "legendFormat": "{{app}}",
              "refId": "A",
              "instant": true
            }
          ]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Service Availability Over Time",
          "gridPos": { "x": 0, "y": 12, "w": 24, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "fieldConfig": {
            "defaults": {
              "custom": { "lineWidth": 2, "fillOpacity": 10 },
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "green", "value": 1 }
                ]
              },
              "color": { "mode": "palette-classic" }
            }
          },
          "targets": [
            {
              "expr": "up{job=\"kubernetes-pods\"}",
              "legendFormat": "{{app}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Prometheus Scrape Duration (seconds)",
          "gridPos": { "x": 0, "y": 20, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": { "lineWidth": 1, "fillOpacity": 5 },
              "color": { "mode": "palette-classic" }
            }
          },
          "targets": [
            {
              "expr": "scrape_duration_seconds{job=\"kubernetes-pods\"}",
              "legendFormat": "{{app}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "Prometheus Samples Scraped",
          "gridPos": { "x": 12, "y": 20, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": {
            "legend": { "displayMode": "list", "placement": "bottom" },
            "tooltip": { "mode": "multi" }
          },
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "lineWidth": 1, "fillOpacity": 5 },
              "color": { "mode": "palette-classic" }
            }
          },
          "targets": [
            {
              "expr": "scrape_samples_scraped{job=\"kubernetes-pods\"}",
              "legendFormat": "{{app}}",
              "refId": "A"
            }
          ]
        }
      ],
      "templating": {
        "list": [
          {
            "name": "DS_PROMETHEUS",
            "type": "datasource",
            "pluginId": "prometheus",
            "hide": 2
          }
        ]
      }
    }
  logs.json: |
    {
      "uid": "ticketflow-logs",
      "title": "TicketFlow — Logs",
      "tags": ["ticketflow", "logs"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "15s",
      "time": { "from": "now-30m", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "logs",
          "title": "gateway",
          "gridPos": { "x": 0, "y": 0, "w": 24, "h": 5 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "options": { "dedupStrategy": "none", "showLabels": false, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true },
          "targets": [{ "expr": "{app=\"gateway\"}", "refId": "A" }]
        },
        {
          "id": 2,
          "type": "logs",
          "title": "user-service",
          "gridPos": { "x": 0, "y": 5, "w": 24, "h": 5 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "options": { "dedupStrategy": "none", "showLabels": false, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true },
          "targets": [{ "expr": "{app=\"user-service\"}", "refId": "A" }]
        },
        {
          "id": 3,
          "type": "logs",
          "title": "event-service",
          "gridPos": { "x": 0, "y": 10, "w": 24, "h": 5 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "options": { "dedupStrategy": "none", "showLabels": false, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true },
          "targets": [{ "expr": "{app=\"event-service\"}", "refId": "A" }]
        },
        {
          "id": 4,
          "type": "logs",
          "title": "booking-service",
          "gridPos": { "x": 0, "y": 15, "w": 24, "h": 5 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "options": { "dedupStrategy": "none", "showLabels": false, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true },
          "targets": [{ "expr": "{app=\"booking-service\"}", "refId": "A" }]
        },
        {
          "id": 5,
          "type": "logs",
          "title": "inventory-service",
          "gridPos": { "x": 0, "y": 20, "w": 24, "h": 5 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "options": { "dedupStrategy": "none", "showLabels": false, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true },
          "targets": [{ "expr": "{app=\"inventory-service\"}", "refId": "A" }]
        },
        {
          "id": 6,
          "type": "logs",
          "title": "payment-service",
          "gridPos": { "x": 0, "y": 25, "w": 24, "h": 5 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "options": { "dedupStrategy": "none", "showLabels": false, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true },
          "targets": [{ "expr": "{app=\"payment-service\"}", "refId": "A" }]
        },
        {
          "id": 7,
          "type": "logs",
          "title": "notification-service",
          "gridPos": { "x": 0, "y": 30, "w": 24, "h": 5 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "options": { "dedupStrategy": "none", "showLabels": false, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true },
          "targets": [{ "expr": "{app=\"notification-service\"}", "refId": "A" }]
        },
        {
          "id": 8,
          "type": "logs",
          "title": "All Services — ERRORs only",
          "gridPos": { "x": 0, "y": 35, "w": 24, "h": 7 },
          "datasource": { "type": "loki", "uid": "${DS_LOKI}" },
          "options": { "dedupStrategy": "none", "showLabels": true, "showTime": true, "sortOrder": "Descending", "wrapLogMessage": true },
          "targets": [{ "expr": "{namespace=\"ticketflow\"} |~ \"(?i)(error|exception|fatal|traceback)\"", "refId": "A" }]
        }
      ],
      "templating": {
        "list": [
          {
            "name": "DS_LOKI",
            "type": "datasource",
            "pluginId": "loki",
            "hide": 2
          }
        ]
      }
    }
  prometheus.json: |
    {
      "uid": "ticketflow-prometheus",
      "title": "TicketFlow — Prometheus",
      "tags": ["ticketflow", "prometheus"],
      "timezone": "browser",
      "schemaVersion": 38,
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Prometheus Health",
          "gridPos": { "x": 0, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": {
            "defaults": {
              "mappings": [
                { "type": "value", "options": { "1": { "text": "UP", "color": "green" }, "0": { "text": "DOWN", "color": "red" } } }
              ],
              "thresholds": { "mode": "absolute", "steps": [{ "color": "green", "value": null }] }
            }
          },
          "targets": [{ "expr": "up{job=\"prometheus\"}", "refId": "A" }]
        },
        {
          "id": 2,
          "type": "stat",
          "title": "Total Targets",
          "gridPos": { "x": 4, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": { "defaults": { "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] } } },
          "targets": [{ "expr": "count(up)", "legendFormat": "Targets", "refId": "A" }]
        },
        {
          "id": 3,
          "type": "stat",
          "title": "Head Series",
          "gridPos": { "x": 8, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": { "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] } } },
          "targets": [{ "expr": "prometheus_tsdb_head_series", "legendFormat": "Series", "refId": "A" }]
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Ingestion Rate",
          "gridPos": { "x": 12, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "area" },
          "fieldConfig": { "defaults": { "unit": "short", "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] } } },
          "targets": [{ "expr": "rate(prometheus_tsdb_head_samples_appended_total[1m])", "legendFormat": "samples/s", "refId": "A" }]
        },
        {
          "id": 5,
          "type": "stat",
          "title": "Storage Size",
          "gridPos": { "x": 16, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": { "reduceOptions": { "calcs": ["lastNotNull"] }, "colorMode": "background", "graphMode": "none" },
          "fieldConfig": { "defaults": { "unit": "bytes", "thresholds": { "mode": "absolute", "steps": [{ "color": "blue", "value": null }] } } },
          "targets": [{ "expr": "prometheus_tsdb_storage_blocks_bytes + prometheus_tsdb_wal_storage_size_bytes", "legendFormat": "Storage", "refId": "A" }]
        },
        {
          "id": 6,
          "type": "timeseries",
          "title": "Scrape Duration by Target",
          "gridPos": { "x": 0, "y": 4, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "lineWidth": 1, "fillOpacity": 5 }, "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "scrape_duration_seconds", "legendFormat": "{{job}} / {{instance}}", "refId": "A" }]
        },
        {
          "id": 7,
          "type": "timeseries",
          "title": "Samples Ingested / sec",
          "gridPos": { "x": 12, "y": 4, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" }, "tooltip": { "mode": "multi" } },
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 1, "fillOpacity": 5 }, "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "rate(prometheus_tsdb_head_samples_appended_total[1m])", "legendFormat": "samples/s", "refId": "A" }]
        },
        {
          "id": 8,
          "type": "timeseries",
          "title": "TSDB Head Series",
          "gridPos": { "x": 0, "y": 11, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 1, "fillOpacity": 10 }, "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "prometheus_tsdb_head_series", "legendFormat": "series", "refId": "A" }]
        },
        {
          "id": 9,
          "type": "timeseries",
          "title": "Query Engine Duration (p99)",
          "gridPos": { "x": 12, "y": 11, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "fieldConfig": { "defaults": { "unit": "s", "custom": { "lineWidth": 1, "fillOpacity": 5 }, "color": { "mode": "palette-classic" } } },
          "targets": [
            {
              "expr": "histogram_quantile(0.99, rate(prometheus_engine_query_duration_seconds_bucket[5m]))",
              "legendFormat": "p99 {{slice}}",
              "refId": "A"
            }
          ]
        },
        {
          "id": 10,
          "type": "timeseries",
          "title": "Prometheus Process Memory",
          "gridPos": { "x": 0, "y": 18, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "fieldConfig": { "defaults": { "unit": "bytes", "custom": { "lineWidth": 1, "fillOpacity": 10 }, "color": { "mode": "palette-classic" } } },
          "targets": [
            { "expr": "process_resident_memory_bytes{job=\"prometheus\"}", "legendFormat": "RSS", "refId": "A" },
            { "expr": "process_virtual_memory_bytes{job=\"prometheus\"}", "legendFormat": "Virtual", "refId": "B" }
          ]
        },
        {
          "id": 11,
          "type": "timeseries",
          "title": "Prometheus CPU Usage",
          "gridPos": { "x": 12, "y": 18, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "${DS_PROMETHEUS}" },
          "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
          "fieldConfig": { "defaults": { "unit": "short", "custom": { "lineWidth": 1, "fillOpacity": 5 }, "color": { "mode": "palette-classic" } } },
          "targets": [{ "expr": "rate(process_cpu_seconds_total{job=\"prometheus\"}[1m])", "legendFormat": "CPU cores", "refId": "A" }]
        }
      ],
      "templating": {
        "list": [
          { "name": "DS_PROMETHEUS", "type": "datasource", "pluginId": "prometheus", "hide": 2 }
        ]
      }
    }

---
# PersistentVolumeClaim for Grafana dashboards and plugins
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: ticketflow
  labels:
    app: grafana
    app.kubernetes.io/component: monitoring
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: ticketflow
  labels:
    app: grafana
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
        app.kubernetes.io/component: monitoring
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.2.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ticketflow-secrets
                  key: GRAFANA_ADMIN_PASSWORD
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
            - name: GF_PATHS_PROVISIONING
              value: /etc/grafana/provisioning
          volumeMounts:
            - name: grafana-data
              mountPath: /var/lib/grafana
            - name: grafana-config
              mountPath: /etc/grafana/grafana.ini
              subPath: grafana.ini
            - name: grafana-config
              mountPath: /etc/grafana/provisioning/datasources/datasources.yaml
              subPath: datasources.yaml
            - name: grafana-config
              mountPath: /etc/grafana/provisioning/dashboards/dashboards.yaml
              subPath: dashboards.yaml
            - name: grafana-dashboards
              mountPath: /etc/grafana/provisioning/dashboards/json
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
      volumes:
        - name: grafana-data
          persistentVolumeClaim:
            claimName: grafana-data
        - name: grafana-config
          configMap:
            name: grafana-config
        - name: grafana-dashboards
          configMap:
            name: grafana-dashboards
      terminationGracePeriodSeconds: 30

---
# LoadBalancer so Grafana UI is accessible externally
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: ticketflow
  labels:
    app: grafana
    app.kubernetes.io/component: monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30030
      name: http
  type: NodePort
