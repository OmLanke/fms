apiVersion: apps/v1
kind: Deployment
metadata:
  name: jaeger
  namespace: ticketflow
  labels:
    app: jaeger
    app.kubernetes.io/component: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: jaeger
  template:
    metadata:
      labels:
        app: jaeger
        app.kubernetes.io/component: monitoring
    spec:
      containers:
        - name: jaeger
          image: jaegertracing/all-in-one:1.60
          ports:
            - containerPort: 16686
              name: ui
            - containerPort: 14268
              name: http-collector
            - containerPort: 6831
              protocol: UDP
              name: agent-udp
            - containerPort: 4317
              name: otlp-grpc
            - containerPort: 4318
              name: otlp-http
          env:
            - name: COLLECTOR_ZIPKIN_HOST_PORT
              value: ":9411"
            - name: MEMORY_MAX_TRACES
              value: "50000"
            - name: SPAN_STORAGE_TYPE
              value: memory
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 16686
            initialDelaySeconds: 20
            periodSeconds: 30
      terminationGracePeriodSeconds: 30

---
# ClusterIP service for the HTTP collector endpoint (used by services to ship traces)
apiVersion: v1
kind: Service
metadata:
  name: jaeger-collector
  namespace: ticketflow
  labels:
    app: jaeger
    app.kubernetes.io/component: monitoring
spec:
  selector:
    app: jaeger
  ports:
    - port: 14268
      targetPort: 14268
      name: http-collector
    - port: 6831
      targetPort: 6831
      protocol: UDP
      name: agent-udp
    - port: 4317
      targetPort: 4317
      name: otlp-grpc
    - port: 4318
      targetPort: 4318
      name: otlp-http
  type: ClusterIP

---
# LoadBalancer service for the Jaeger UI — accessible externally
apiVersion: v1
kind: Service
metadata:
  name: jaeger
  namespace: ticketflow
  labels:
    app: jaeger
    app.kubernetes.io/component: monitoring
spec:
  selector:
    app: jaeger
  ports:
    - port: 16686
      targetPort: 16686
      nodePort: 30686
      name: ui
  type: NodePort
