apiVersion: apps/v1
kind: Deployment
metadata:
  name: booking-service
  namespace: ticketflow
  labels:
    app: booking-service
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: booking-service
  template:
    metadata:
      labels:
        app: booking-service
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3003"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: booking-service
          image: ticketflow/booking-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3003
          envFrom:
            - configMapRef:
                name: ticketflow-config
            - secretRef:
                name: ticketflow-secrets
          env:
            - name: PORT
              value: "3003"
            # JDBC URL for PostgreSQL bookings database
            - name: BOOKING_DB_URL
              value: "jdbc:postgresql://postgres:5432/ticketflow_bookings"
          resources:
            # JVM services require more memory
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /api/bookings/health
              port: 3003
            # JVM startup takes longer
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/bookings/health
              port: 3003
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: booking-service
  namespace: ticketflow
  labels:
    app: booking-service
    app.kubernetes.io/component: backend
spec:
  selector:
    app: booking-service
  ports:
    - port: 3003
      targetPort: 3003
      name: http
  type: ClusterIP
