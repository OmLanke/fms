apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-service
  namespace: ticketflow
  labels:
    app: inventory-service
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-service
  template:
    metadata:
      labels:
        app: inventory-service
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3004"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: inventory-service
          image: ticketflow/inventory-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3004
          envFrom:
            - configMapRef:
                name: ticketflow-config
            - secretRef:
                name: ticketflow-secrets
          env:
            - name: PORT
              value: "3004"
            # PostgreSQL connection using libpq-style URL (Bun/Node compatible)
            - name: INVENTORY_DB_URL
              value: "postgresql://$(DB_USERNAME):$(DB_PASSWORD)@postgres:5432/ticketflow_inventory"
            # Redis for caching inventory counts
            - name: REDIS_URL
              value: "redis://:$(REDIS_PASSWORD)@redis:6379"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3004
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: inventory-service
  namespace: ticketflow
  labels:
    app: inventory-service
    app.kubernetes.io/component: backend
spec:
  selector:
    app: inventory-service
  ports:
    - port: 3004
      targetPort: 3004
      name: http
  type: ClusterIP
