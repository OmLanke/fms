apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: ticketflow
  labels:
    app: payment-service
    app.kubernetes.io/component: backend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-service
  template:
    metadata:
      labels:
        app: payment-service
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3005"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: payment-service
          image: ticketflow/payment-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3005
          envFrom:
            - configMapRef:
                name: ticketflow-config
            - secretRef:
                name: ticketflow-secrets
          env:
            - name: PORT
              value: "3005"
            - name: MONGODB_URL
              value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@mongodb:27017"
            - name: MONGODB_DB
              value: "ticketflow_payments"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3005
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: ticketflow
  labels:
    app: payment-service
    app.kubernetes.io/component: backend
spec:
  selector:
    app: payment-service
  ports:
    - port: 3005
      targetPort: 3005
      name: http
  type: ClusterIP
