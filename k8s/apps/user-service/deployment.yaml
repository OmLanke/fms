apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: ticketflow
  labels:
    app: user-service
    app.kubernetes.io/component: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3001"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: user-service
          image: ticketflow/user-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          envFrom:
            - configMapRef:
                name: ticketflow-config
            - secretRef:
                name: ticketflow-secrets
          env:
            - name: PORT
              value: "3001"
            # JDBC URL for PostgreSQL users database
            - name: USER_DB_URL
              value: "jdbc:postgresql://postgres:5432/ticketflow_users"
          resources:
            # JVM services require more memory
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          readinessProbe:
            httpGet:
              path: /api/users/health
              port: 3001
            # JVM startup takes longer
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/users/health
              port: 3001
            initialDelaySeconds: 90
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: ticketflow
  labels:
    app: user-service
    app.kubernetes.io/component: backend
spec:
  selector:
    app: user-service
  ports:
    - port: 3001
      targetPort: 3001
      name: http
  type: ClusterIP
