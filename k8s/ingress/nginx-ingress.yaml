apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: ticketflow-ingress
  namespace: ticketflow
  labels:
    app.kubernetes.io/name: ticketflow
    app.kubernetes.io/component: ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    # cert-manager will automatically provision a TLS certificate
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.ticketflow.example.com
        - ticketflow.example.com
      secretName: ticketflow-tls
  rules:
    - host: api.ticketflow.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: gateway
                port:
                  number: 3000
    - host: ticketflow.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80
