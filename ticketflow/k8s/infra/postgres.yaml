---
# ConfigMap with database initialization SQL
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: ticketflow
  labels:
    app: postgres
    app.kubernetes.io/component: database
data:
  init.sql: |
    -- Create databases for all services that use PostgreSQL
    CREATE DATABASE ticketflow_users;
    CREATE DATABASE ticketflow_bookings;
    CREATE DATABASE ticketflow_inventory;

    -- Grant privileges
    GRANT ALL PRIVILEGES ON DATABASE ticketflow_users TO postgres;
    GRANT ALL PRIVILEGES ON DATABASE ticketflow_bookings TO postgres;
    GRANT ALL PRIVILEGES ON DATABASE ticketflow_inventory TO postgres;

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: ticketflow
  labels:
    app: postgres
    app.kubernetes.io/component: database
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
        app.kubernetes.io/component: database
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              valueFrom:
                configMapKeyRef:
                  name: ticketflow-config
                  key: DB_USERNAME
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ticketflow-secrets
                  key: DB_PASSWORD
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            - name: init-scripts
              mountPath: /docker-entrypoint-initdb.d/
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 5
          livenessProbe:
            exec:
              command:
                - pg_isready
                - -U
                - postgres
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
      volumes:
        - name: init-scripts
          configMap:
            name: postgres-init
  volumeClaimTemplates:
    - metadata:
        name: postgres-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 10Gi

---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: ticketflow
  labels:
    app: postgres
    app.kubernetes.io/component: database
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432
      name: postgres
  type: ClusterIP
