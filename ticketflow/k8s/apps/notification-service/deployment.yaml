apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: ticketflow
  labels:
    app: notification-service
    app.kubernetes.io/component: backend
spec:
  # replicas: 1 — KEDA will handle autoscaling based on Kafka lag
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
        app.kubernetes.io/component: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3006"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: notification-service
          image: ticketflow/notification-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3006
          envFrom:
            - configMapRef:
                name: ticketflow-config
            - secretRef:
                name: ticketflow-secrets
          env:
            - name: PORT
              value: "3006"
            - name: MONGODB_URL
              value: "mongodb://$(MONGO_USERNAME):$(MONGO_PASSWORD)@mongodb:27017"
            - name: MONGODB_DB
              value: "ticketflow_notifications"
            - name: SMTP_HOST
              valueFrom:
                configMapKeyRef:
                  name: ticketflow-config
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: ticketflow-config
                  key: SMTP_PORT
            - name: SMTP_FROM
              valueFrom:
                configMapKeyRef:
                  name: ticketflow-config
                  key: SMTP_FROM
            - name: SMTP_USERNAME
              valueFrom:
                secretKeyRef:
                  name: ticketflow-secrets
                  key: SMTP_USERNAME
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: ticketflow-secrets
                  key: SMTP_PASSWORD
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3006
            initialDelaySeconds: 60
            periodSeconds: 30
            failureThreshold: 3
      terminationGracePeriodSeconds: 30

---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: ticketflow
  labels:
    app: notification-service
    app.kubernetes.io/component: backend
spec:
  selector:
    app: notification-service
  ports:
    - port: 3006
      targetPort: 3006
      name: http
  type: ClusterIP
