# KEDA (Kubernetes Event-Driven Autoscaling) Installation
#
# KEDA is NOT installed via a manifest in this file — it is installed via Helm
# or the official KEDA operator. Run ONE of the following commands before
# applying the ScaledObjects in scaled-objects.yaml:
#
# Option 1 — Helm (recommended):
#   helm repo add kedacore https://kedacore.github.io/charts
#   helm repo update
#   helm install keda kedacore/keda --namespace keda --create-namespace
#
# Option 2 — kubectl apply (latest release):
#   kubectl apply --server-side -f https://github.com/kedacore/keda/releases/download/v2.15.1/keda-2.15.1.yaml
#
# Verify installation:
#   kubectl get pods -n keda
#
# After KEDA is running, apply the ScaledObjects:
#   kubectl apply -f k8s/keda/scaled-objects.yaml
#
# NOTE: When using KEDA ScaledObjects alongside HPAs that target the same
# Deployment, KEDA will take precedence for replica management. The HPA files
# for payment-service and notification-service use minReplicas: 1 to avoid
# conflicts. Alternatively, remove those HPA files entirely and let KEDA
# handle all scaling for those two services.
