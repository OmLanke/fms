---
# ScaledObject for payment-service — scales based on Kafka consumer lag
# on the ticketflow.payment.requested topic
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: payment-service-scaler
  namespace: ticketflow
spec:
  scaleTargetRef:
    name: payment-service
  minReplicaCount: 1
  maxReplicaCount: 20
  cooldownPeriod: 30
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: payment-service
        topic: ticketflow.payment.requested
        lagThreshold: "5"
        activationLagThreshold: "1"

---
# ScaledObject for notification-service — scales based on Kafka consumer lag
# on the ticketflow.booking.confirmed topic
apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: notification-service-scaler
  namespace: ticketflow
spec:
  scaleTargetRef:
    name: notification-service
  minReplicaCount: 1
  maxReplicaCount: 10
  cooldownPeriod: 60
  triggers:
    - type: kafka
      metadata:
        bootstrapServers: kafka:9092
        consumerGroup: notification-service
        topic: ticketflow.booking.confirmed
        lagThreshold: "10"
        activationLagThreshold: "2"
