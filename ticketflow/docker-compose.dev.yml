name: ticketflow

services:
  # ─────────────────────────────────────────────
  # INFRASTRUCTURE
  # ─────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: ticketflow-postgres
    environment:
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticketflow-net

  mongodb:
    image: mongo:7.0
    container_name: ticketflow-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USERNAME:-mongo}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-mongo}
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
      - ./infra/mongo/init.js:/docker-entrypoint-initdb.d/init.js
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ticketflow-net

  redis:
    image: redis:7-alpine
    container_name: ticketflow-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --save 60 1 --loglevel warning
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ticketflow-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.7.0
    container_name: ticketflow-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_logs:/var/lib/zookeeper/log
    healthcheck:
      test: ["CMD-SHELL", "/usr/local/bin/cub zk-ready localhost:2181 10 2>/dev/null"]
      interval: 10s
      timeout: 15s
      retries: 5
    networks:
      - ticketflow-net

  kafka:
    image: confluentinc/cp-kafka:7.7.0
    container_name: ticketflow-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_RETENTION_HOURS: 168
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/usr/bin/kafka-topics --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks:
      - ticketflow-net

  # Kafka topic initializer (runs once then exits)
  kafka-init:
    image: confluentinc/cp-kafka:7.7.0
    container_name: ticketflow-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ./infra/kafka/create-topics.sh:/create-topics.sh
    command: ["bash", "/create-topics.sh"]
    environment:
      KAFKA_BROKER: kafka:9092
    networks:
      - ticketflow-net

  # Kafka UI — browse topics, messages, consumer groups
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: ticketflow-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: ticketflow-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181
    networks:
      - ticketflow-net

  # Mongo Express — MongoDB GUI
  mongo-express:
    image: mongo-express:1.0.2
    container_name: ticketflow-mongo-express
    depends_on:
      mongodb:
        condition: service_healthy
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USERNAME:-mongo}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD:-mongo}
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH: "false"
    networks:
      - ticketflow-net

  # Mailpit — Email testing UI
  mailpit:
    image: axllent/mailpit:latest
    container_name: ticketflow-mailpit
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI
    environment:
      MP_MAX_MESSAGES: 5000
      MP_DATABASE: /data/mailpit.db
      MP_SMTP_AUTH_ACCEPT_ANY: "true"
      MP_SMTP_AUTH_ALLOW_INSECURE: "true"
    volumes:
      - mailpit_data:/data
    networks:
      - ticketflow-net

  # ─────────────────────────────────────────────
  # APPLICATION SERVICES
  # ─────────────────────────────────────────────

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: ticketflow-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod-min-32-chars-long}
      USER_SERVICE_URL: http://user-service:3001
      EVENT_SERVICE_URL: http://event-service:3002
      BOOKING_SERVICE_URL: http://booking-service:3003
      INVENTORY_SERVICE_URL: http://inventory-service:3004
      PAYMENT_SERVICE_URL: http://payment-service:3005
      NOTIFICATION_SERVICE_URL: http://notification-service:3006
    depends_on:
      - user-service
      - event-service
      - booking-service
      - inventory-service
      - payment-service
      - notification-service
    networks:
      - ticketflow-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3

  user-service:
    build:
      context: ./services/user-service
      dockerfile: Dockerfile
    container_name: ticketflow-user-service
    environment:
      PORT: 3001
      USER_DB_URL: jdbc:postgresql://postgres:5432/ticketflow_users
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-in-prod-min-32-chars-long}
      JWT_EXPIRATION: 604800000
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ticketflow-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/api/users/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  event-service:
    build:
      context: ./services/event-service
      dockerfile: Dockerfile
    container_name: ticketflow-event-service
    environment:
      PORT: 3002
      MONGODB_URL: mongodb://${MONGO_USERNAME:-mongo}:${MONGO_PASSWORD:-mongo}@mongodb:27017
      MONGODB_DB: ticketflow_events
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ticketflow-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:3002/health')\" || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  booking-service:
    build:
      context: ./services/booking-service
      dockerfile: Dockerfile
    container_name: ticketflow-booking-service
    environment:
      PORT: 3003
      BOOKING_DB_URL: jdbc:postgresql://postgres:5432/ticketflow_bookings
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-postgres}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ticketflow-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3003/api/bookings/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  inventory-service:
    build:
      context: ./services/inventory-service
      dockerfile: Dockerfile
    container_name: ticketflow-inventory-service
    environment:
      PORT: 3004
      INVENTORY_DB_URL: postgresql://${DB_USERNAME:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/ticketflow_inventory
      REDIS_URL: redis://redis:6379
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ticketflow-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3004/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  payment-service:
    build:
      context: ./services/payment-service
      dockerfile: Dockerfile
    container_name: ticketflow-payment-service
    environment:
      PORT: 3005
      MONGODB_URL: mongodb://${MONGO_USERNAME:-mongo}:${MONGO_PASSWORD:-mongo}@mongodb:27017
      MONGODB_DB: ticketflow_payments
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      PAYMENT_SUCCESS_RATE: ${PAYMENT_SUCCESS_RATE:-0.95}
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - ticketflow-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:3005/health')\" || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  notification-service:
    build:
      context: ./services/notification-service
      dockerfile: Dockerfile
    container_name: ticketflow-notification-service
    environment:
      PORT: 3006
      MONGODB_URL: mongodb://${MONGO_USERNAME:-mongo}:${MONGO_PASSWORD:-mongo}@mongodb:27017
      MONGODB_DB: ticketflow_notifications
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_FROM: noreply@ticketflow.com
      SMTP_USERNAME: ""
      SMTP_PASSWORD: ""
    depends_on:
      mongodb:
        condition: service_healthy
      kafka:
        condition: service_healthy
      mailpit:
        condition: service_started
    networks:
      - ticketflow-net
    healthcheck:
      test: ["CMD-SHELL", "python3 -c \"import urllib.request; urllib.request.urlopen('http://localhost:3006/health')\" || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 5

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ticketflow-frontend
    ports:
      - "5173:80"
    environment:
      VITE_API_BASE_URL: http://localhost:3000
    depends_on:
      - gateway
    networks:
      - ticketflow-net

volumes:
  postgres_data:
  mongodb_data:
  redis_data:
  kafka_data:
  zookeeper_data:
  zookeeper_logs:
  mailpit_data:

networks:
  ticketflow-net:
    driver: bridge
